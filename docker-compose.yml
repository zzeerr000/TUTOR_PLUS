services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tutorplus-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    volumes:
      - ./data/tutorplus.db:/app/tutorplus.db
      - ./data/uploads:/app/uploads
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tutorplus-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes: {}
